{% extends "base.html" %}

{% block title %} Login {% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p>Please enter your details</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign in</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
  </div>
</div>
{% endblock %}
