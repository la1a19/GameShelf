{% extends "base.html" %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>Sign up</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Create account</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
    </div>
</div>
{% endblock %}
